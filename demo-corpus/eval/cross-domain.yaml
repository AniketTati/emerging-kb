  - id: cross-q022
    question: "What is the most sensitive PII in this corpus + how should it be handled?"
    stratum: aggregation
    layers: [L3]
    planner_modes: [A]
    channels: [bm25_chunks]
    design_gaps: [D5_pii]
    difficulty: medium
    expected_answer: |
      Sensitive PII categories: Aadhaar numbers, PAN numbers, full addresses, mobile numbers, email addresses, banking account numbers, medical record numbers.
      Handling per DPDP Act 2023 + sectoral rules:
      - Aadhaar: mask to last-4 unless specific authenticated purpose
      - PAN: mask first-5 unless tax/banking context with auth
      - Addresses: typically partial / city-level
      - Medical: never cross-domain without explicit consent
      - Banking accounts: never disclose full numbers
    expected_citations: []
    domains_touched: [legal, healthcare, mining, government, finance, construction]

