# CROSS-DOMAIN EVAL SUITE — 30 queries
#
# Tests cross-domain entity resolution, multi-domain synthesis, and
# the cross-domain hooks deliberately seeded in the corpus.

scope: cross-domain
total_queries: 30

queries:

  # =========================================================================
  # ACME CORP CROSS-DOMAIN (Legal × Finance × Construction)
  # =========================================================================

  - id: cross-q001
    question: "What is Acme Corp's total exposure to HDFC Bank across all products?"
    stratum: aggregation
    also_tests: [chain-aware]
    layers: [L4, L5]
    planner_modes: [A, M, K]
    channels: [bm25_chunks, dense_chunks, mentions_exact]
    design_gaps: [D1_q_mode, D3_chains, D6_vocab]
    difficulty: hard
    expected_answer: |
      Approximately INR 174 crore aggregate:
      - Term loan (HDFC-CORP-TL-2023-08412): INR 64 cr outstanding (per Addendum #2)
      - Operating CA balance: INR 28.42 cr (31 Mar 2025)
      - LC + trade-finance line: INR 18 cr limit
      - FX hedge book: USD 5.5M (~INR 46 cr) + GBP 0.4M (~INR 4 cr)
      Per treasury-004 + profile-001.
    expected_citations: [profile-001-acme-corporate, treasury-004-acme-counterparty-credit-limits, loan-001-acme-hdfc-addendum-2]
    domains_touched: [finance]
    note: "Cross-channel: requires multi-doc synthesis + alias resolution."

  - id: cross-q002
    question: "What is the collateral for Acme's HDFC loan + where else does that collateral appear in the corpus?"
    stratum: chain-aware
    also_tests: [cross-domain]
    layers: [L4, L5]
    planner_modes: [C, K, M]
    channels: [mentions_exact, bm25_chunks]
    design_gaps: [D3_chains, D6_vocab]
    difficulty: hard
    expected_answer: |
      Per Addendum #2, primary collateral is the Bangalore Whitefield data centre
      (INR 168 cr valuation). This asset is being built under the construction-
      domain project (Acme Whitefield Datacentre Phase-2) with EPC contractor
      Mahalaxmi Infra. So the same asset appears in: (a) finance/loan-001-
      addendum-2 as collateral; (b) construction/contract-001-acme-mahalaxmi-epc
      as the construction project itself; (c) construction/drawing-001-revC as
      the architectural drawings.
    expected_citations: [loan-001-acme-hdfc-addendum-2, contract-001-acme-mahalaxmi-epc, drawing-001-arch-datacentre-revC]
    domains_touched: [finance, construction]

