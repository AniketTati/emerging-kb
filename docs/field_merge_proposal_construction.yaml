workspace_id: c0000000-0000-0000-0000-000000000001
doctypes:
  architectural_drawing:
    groups:
    - canonical: date
      variants:
      - date
      - issue_date
      - effective_date
      reason: These fields all represent the date the drawing was issued or became
        effective.
    - canonical: approved_by
      variants:
      - approved_by
      - approved_by_1
      - approved_by_2
      - approved_by_signoff
      reason: These fields all refer to the person or persons who approved the architectural
        plan, often with a sign-off.
    - canonical: checked_by
      variants:
      - checked_by
      - checked_by_signoff
      reason: These fields both refer to the person who checked the architectural
        drawing, including sign-off.
    - canonical: drawn_by
      variants:
      - drawn_by
      - drawn_by_signoff
      reason: These fields both refer to the person who drew the architectural plan,
        including sign-off.
    - canonical: status
      variants:
      - status
      - final_status
      - current_document_status
      - issued_for_status
      reason: These fields all describe the overall status of the drawing document,
        whether current, final, or for what purpose it was issued.
    - canonical: project_name
      variants:
      - project_name
      - project
      reason: These fields both refer to the name of the project associated with the
        drawing.
    - canonical: client
      variants:
      - client
      - client_cfo_name
      - client_medical_name
      reason: These fields all refer to the client or different representatives of
        the client.
    - canonical: first_floor_area_sqm
      variants:
      - first_floor_area_sq_m
      - first_floor_area_sqm
      reason: These fields both represent the area of the first floor in square meters.
    - canonical: ground_floor_area_sqm
      variants:
      - ground_floor_area_sq_m
      - ground_floor_area_sqm
      - ground_floor_built_up_area
      reason: These fields all refer to the area of the ground floor, in square meters
        or as a built-up area.
    - canonical: main_load_bearing_wall_position
      variants:
      - main_load_bearing_wall_position
      - wall_position_confirmation
      reason: These fields both describe the position of the main internal load-bearing
        wall, with one offering a confirmation.
  change_order:
    groups: []
  daily_site_report:
    groups:
    - canonical: project_day
      variants:
      - project_day
      - total_project_days
      reason: Both fields refer to the current day number of the project.
    - canonical: site
      variants:
      - site
      - site_name
      reason: Both fields refer to the name of the construction site.
    - canonical: weather
      variants:
      - weather
      - weather_conditions
      - weather_description
      reason: All three fields describe the weather conditions reported for the day.
    - canonical: project_manager_signed
      variants:
      - project_manager_signed
      - signed_by_pm
      reason: Both fields capture the name of the project manager who signed the report.
    - canonical: site_engineer_signed
      variants:
      - site_engineer_signed
      - signed_by_site_engineer
      reason: Both fields capture the name of the site engineer who signed the report.
  inspection_report:
    groups:
    - canonical: inspection_date
      variants:
      - inspection_date
      - walk_down_date
      reason: Both fields refer to the date when the inspection or walk-down took
        place.
    - canonical: project
      variants:
      - project
      - site
      reason: Both fields refer to the name of the project or site being inspected.
  meeting_minutes:
    groups:
    - canonical: date
      variants:
      - date
      - meeting_date
      reason: Both 'date' and 'meeting_date' refer to the date when the meeting took
        place.
  progress_report:
    groups: []
  purchase_order:
    groups:
    - canonical: po_date
      variants:
      - po_date
      - buyer_authoriser_date
      reason: These fields both refer to the date the purchase order was issued or
        authorized by the buyer.
    - canonical: total_inr
      variants:
      - total_inr
      - sub_total_inr
      reason: These fields both represent the grand total or sub-total monetary amount
        of the purchase order in INR, and are semantically very close in the context
        of a purchase order.
    - canonical: accepted_vendor_date
      variants:
      - accepted_vendor_date
      - vendor_acceptance_date
      reason: Both fields refer to the date when the purchase order was accepted by
        the vendor.
    - canonical: accepted_vendor_name
      variants:
      - accepted_vendor_name
      - vendor_acceptor
      reason: Both fields refer to the name of the person who accepted the purchase
        order on behalf of the vendor.
    - canonical: gst_amount_inr
      variants:
      - gst_amount_inr
      - total_gst_amount
      reason: Both fields represent the total amount of GST applied to the purchase
        order in INR.
  rfi_response:
    groups:
    - canonical: rfi_date
      variants:
      - rfi_date
      - request_date
      reason: Both fields represent the date when the RFI was initiated.
    - canonical: response_date
      variants:
      - response_date
      - rfi_response_date
      reason: Both fields indicate the date when the RFI was responded to.
    - canonical: requestor_company
      variants:
      - requestor_company
      - rfi_initiator_company
      - rfi_sender_company
      reason: These fields all refer to the company of the entity that initiated or
        sent the RFI.
    - canonical: requestor_name
      variants:
      - requestor_name
      - rfi_initiator_name
      - rfi_sender_name
      reason: These fields all refer to the name of the individual who initiated or
        sent the RFI.
    - canonical: rfi_recipient_name
      variants:
      - rfi_recipient_name
      - rfi_responder_name
      reason: Both fields refer to the name of the person who received or responded
        to the RFI.
    - canonical: rfi_recipient_company
      variants:
      - rfi_recipient_company
      - rfi_responder_company
      reason: Both fields refer to the company of the person who received or responded
        to the RFI.
  safety_incident_report:
    groups:
    - canonical: incident_date
      variants:
      - incident_date
      - date_of_incident
      reason: Both fields represent the date when the incident occurred.
    - canonical: incident_time
      variants:
      - incident_time
      - time_of_incident
      reason: Both fields represent the time when the incident occurred.
  safety_report:
    groups:
    - canonical: period
      variants:
      - period
      - report_period_end
      - report_period_start
      reason: These fields all describe aspects of the reporting period and can be
        unified under a single 'period' concept, with start and end dates as sub-fields
        if needed.
