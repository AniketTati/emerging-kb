      must_refuse: false
      min_citations: 1
  - id: rare-005
    stratum: rare_clause
    text: "Find clauses about liquidated damages exceeding $1M."
    expected:
      keywords: ["liquidated damages"]
      must_refuse: false
      min_citations: 1

