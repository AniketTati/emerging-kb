# B9 / WA-17 — 45-question golden set, 5 questions × 9 strata.
#
# Architecture §"45 = 5 questions × 9 strata — PDF asks ≥15".
#
# These questions are templated for the CUAD + Enron + SEC demo corpus.
# Operators replace question text + expectations to match their actual
# loaded workspace. Each entry's `expected` block:
#
#   - keywords      — answer text should mention at least one (lexical recall proxy)
#   - must_refuse   — true if the correct answer is "no such fact" (negative
#                     queries; refusal correctness)
#   - min_citations — minimum citation count when not refused
#   - mode_hint     — optional mode preference for the planner
#
# Scorer rules:
#   - lexical_overlap  = |answer_tokens ∩ keyword_tokens| / |keyword_tokens|
#   - refusal_correct  = (answer.refused == must_refuse)
#   - citation_ok      = len(citations) >= min_citations (unless must_refuse)
#
# Total: 45 questions across 9 strata.

questions:
  # ---- Stratum 1: Needle queries (single doc hidden in corpus) ----
  - id: needle-001
    stratum: needle
    text: "What is the indemnification cap in the ACME-Vertex master services agreement?"
    expected:
      keywords: ["indemnification", "cap"]
      must_refuse: false
      min_citations: 1
  - id: needle-002
    stratum: needle
    text: "What is the termination notice period in the supplier agreement with NorthStar?"
    expected:
      keywords: ["termination", "notice"]
      must_refuse: false
      min_citations: 1
  - id: needle-003
    stratum: needle
    text: "What is the data retention requirement in the privacy agreement?"
    expected:
      keywords: ["retention"]
      must_refuse: false
      min_citations: 1
  - id: needle-004
    stratum: needle
    text: "What is the warranty period in the equipment purchase agreement?"
    expected:
      keywords: ["warranty"]
      must_refuse: false
      min_citations: 1
  - id: needle-005
    stratum: needle
    text: "Who signed the most recent amendment to the licensing agreement?"
    expected:
      keywords: ["amendment"]
      must_refuse: false
      min_citations: 1

  # ---- Stratum 2: Rare-clause queries ----
  - id: rare-001
